<div class="navbar-collapse collapse" id="navbarCollapse">
    <ul class="navbar-nav navbar-nav-scroll me-auto">
        {volist name="www_top" id="nav"}
        {if isset($nav.son) && count($nav.son) > 0}
        <li class="nav-item dropdown">
            <a class="nav-link dropdown-toggle" href="#" id="pagesMenu" data-bs-toggle="dropdown" aria-haspopup="true" aria-expanded="false">
                {if $nav.fa_icon}
                <i class="{$nav.fa_icon}"></i>
                {/if}
                {$nav.name}
            </a>
            <ul class="dropdown-menu" aria-labelledby="listingMenu">
                {volist name="nav.son" id="menu"}
                <li><a class="dropdown-item" href="{$menu.url}" target="_blank">{$menu.name}</a></li>
                {/volist}
            </ul>
        </li>
        {else}
        <li class="nav-item">
            <a class="nav-link" href="{$nav.url}" target="_blank">
                {if $nav.fa_icon}
                <i class="{$nav.fa_icon}"></i>
                {/if}
                <span class="">{$nav.name}</span>
            </a>
        </li>
        {/if}
        {/volist}
    </ul>
</div>
